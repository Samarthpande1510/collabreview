services:
  collabreview:
    image: postgres:16

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

    ports:
    - "5432:5432"

    env_file:
    - .env

    restart: unless-stopped


    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
    - postgres_data:/var/lib/postgresql/data

  collabreview-redis:
    image: redis:7-alpine

    healthcheck:
      test: ["CMD-SHELL","redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

    ports:
    - "6379:6379"

    restart: unless-stopped

    volumes:
    - redis_data:/data

volumes:
  postgres_data:
  redis_data:


